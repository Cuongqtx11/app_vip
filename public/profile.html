<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trang cá nhân | Kho App VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .dark body {
            background-color: #000000;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(28, 28, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="transition-colors duration-300 pb-20">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-b border-gray-100 dark:border-white/5 h-16 flex items-center px-4">
        <div class="max-w-5xl mx-auto w-full flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='/'">
                <div class="w-9 h-9 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <i data-lucide="crown" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-lg font-black tracking-tighter uppercase dark:text-white">Kho App Vip</span>
            </div>
            <button onclick="handleLogout()" class="text-xs font-bold text-red-500 bg-red-50 dark:bg-red-500/10 px-4 py-2 rounded-full uppercase tracking-widest active:scale-95 transition-all">Đăng xuất</button>
        </div>
    </header>

    <main class="pt-24 px-4 max-w-5xl mx-auto space-y-6">
        <!-- Profile Info -->
        <section class="glass-card rounded-[2.5rem] p-8 flex flex-col md:flex-row items-center gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div id="profileAvatar" class="w-24 h-24 rounded-[2rem] bg-gradient-to-br from-purple-600 to-indigo-600 text-white flex items-center justify-center text-4xl font-black shadow-2xl shadow-purple-500/30">C</div>
            <div class="text-center md:text-left flex-1">
                <h1 id="profileUsername" class="text-3xl font-black tracking-tight text-gray-900 dark:text-white">-</h1>
                <div class="flex flex-wrap justify-center md:justify-start gap-2 mt-4">
                    <span class="px-3 py-1 bg-purple-100 dark:bg-purple-500/20 text-purple-600 text-[10px] font-bold rounded-full uppercase tracking-widest">Thành viên VIP</span>
                    <span id="regDate" class="px-3 py-1 bg-gray-100 dark:bg-white/5 text-gray-500 text-[10px] font-bold rounded-full uppercase tracking-widest">Tham gia: -</span>
                </div>
            </div>
        </section>

        <!-- Stats Overview -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500 delay-100">
            <div class="glass-card rounded-3xl p-6 text-center">
                <span class="block text-2xl font-black text-purple-600" id="totalKeys">0</span>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Mã VIP đã có</span>
            </div>
            <div class="glass-card rounded-3xl p-6 text-center">
                <span class="block text-2xl font-black text-green-500" id="totalUsage">0</span>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Lượt tải đã dùng</span>
            </div>
            <div class="glass-card rounded-3xl p-6 text-center">
                <span class="block text-2xl font-black text-orange-500" id="activeKeys">0</span>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Đang hoạt động</span>
            </div>
            <div class="glass-card rounded-3xl p-6 text-center">
                <span class="block text-2xl font-black text-blue-500" id="daysVIP">0</span>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Ngày dùng VIP</span>
            </div>
        </section>

        <!-- UDID Verification Card [4] -->
        <section class="animate-in fade-in slide-in-from-bottom-4 duration-500 delay-200">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2.5rem] p-8 md:p-10 text-white shadow-2xl shadow-purple-500/20 relative overflow-hidden">
                <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center">
                            <i data-lucide="gift" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-black uppercase tracking-tight">🎁 Nhận Key VIP Miễn Phí</h2>
                    </div>
                    <p class="text-white/80 font-medium mb-8 leading-relaxed">Đã mua chứng chỉ tại <b class="text-white underline">cuios.shop</b>? Nhập UDID iPhone để nhận 1 tháng VIP miễn phí.</p>
                    
                    <div class="space-y-4 max-w-lg">
                        <div class="space-y-2">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-[10px] font-black uppercase tracking-widest opacity-60">Nhập UDID thiết bị</label>
                                <button onclick="showUDIDGuide()" class="text-[10px] font-black uppercase tracking-widest text-yellow-400 hover:text-yellow-300 underline">Cách tìm UDID của tôi?</button>
                            </div>
                            <div class="relative">
                                <i data-lucide="smartphone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
                                <input type="text" id="udidInput" class="w-full h-14 pl-12 pr-4 bg-white/10 border border-white/10 focus:border-white/40 rounded-2xl outline-none font-mono text-sm tracking-wider placeholder:text-white/20 transition-all uppercase" placeholder="00008030-XXXXXXXXXXXXXXXX">
                            </div>
                        </div>
                        
                        <div id="udidStatus" class="hidden p-4 rounded-2xl bg-white/10 border border-white/5 text-sm font-bold text-center animate-in fade-in zoom-in duration-300">
                            <span id="udidStatusText"></span>
                        </div>

                        <button id="verifyUDIDBtn" onclick="handleVerifyUDID()" class="w-full h-14 bg-white text-purple-700 font-black rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                            Xác minh UDID
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tabs: Keys -->
        <section class="animate-in fade-in slide-in-from-bottom-4 duration-500 delay-300">
            <div class="flex border-b border-gray-100 dark:border-white/5 mb-6">
                <button class="pb-4 px-6 text-sm font-bold uppercase tracking-wider border-b-2 border-purple-600 text-purple-600">Mã VIP của tôi</button>
            </div>

            <div id="keysSection" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-full py-20 text-center text-gray-400">
                    <i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto mb-4 opacity-20"></i>
                    <p class="font-bold text-xs uppercase tracking-widest opacity-50">Đang tải dữ liệu...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const AUTH = { user: null, keys: [] };

        async function init() {
            const token = localStorage.getItem('auth_token');
            if (!token) return location.href = 'login.html?redirect=profile.html';

            try {
                const res = await fetch('/api/user?action=profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    AUTH.user = data.user;
                    AUTH.keys = data.keys || [];
                    renderProfile();
                    renderKeys();
                } else {
                    localStorage.clear();
                    location.href = 'login.html?redirect=profile.html';
                }
            } catch (e) {
                console.error("Init failed:", e);
            }
        }

        function renderProfile() {
            document.getElementById('profileUsername').textContent = AUTH.user.username;
            document.getElementById('profileAvatar').textContent = AUTH.user.username[0].toUpperCase();
            const regDate = new Date(AUTH.user.created_at).toLocaleDateString('vi-VN');
            document.getElementById('regDate').textContent = `Tham gia: ${regDate}`;

            document.getElementById('totalKeys').textContent = AUTH.keys.length;
            document.getElementById('totalUsage').textContent = AUTH.keys.reduce((s, k) => s + (k.usage_count || 0), 0);
            document.getElementById('activeKeys').textContent = AUTH.keys.filter(k => k.status === 'active').length;
            
            let maxDays = 0;
            const now = new Date();
            AUTH.keys.forEach(k => {
                if (k.expires_at) {
                    const diff = Math.ceil((new Date(k.expires_at) - now) / (1000*60*60*24));
                    if (diff > maxDays) maxDays = diff;
                } else if (k.package_name && k.package_name.includes('Vĩnh Viễn')) {
                    maxDays = 9999;
                }
            });
            document.getElementById('daysVIP').textContent = maxDays === 9999 ? '∞' : (maxDays > 0 ? maxDays : 0);
        }

        function renderKeys() {
            const container = document.getElementById('keysSection');
            if (AUTH.keys.length === 0) {
                container.innerHTML = `<div class="col-span-full py-16 glass-card rounded-3xl text-center border-dashed"><p class="font-bold text-xs uppercase tracking-widest text-gray-400">Bạn chưa sở hữu mã VIP nào</p></div>`;
                return;
            }

            container.innerHTML = AUTH.keys.map(k => {
                const expires = k.expires_at ? new Date(k.expires_at) : null;
                const isExpired = k.status !== 'active' || (expires && expires < new Date());
                const expiryStr = expires ? expires.toLocaleDateString('vi-VN') : 'Vĩnh viễn';
                const usageStr = k.max_usage > 9000 ? 'Không giới hạn' : `${k.max_usage - (k.usage_count || 0)} lượt`;

                return `
                    <div class="glass-card rounded-[2rem] p-6 space-y-4 border-2 ${isExpired ? 'border-gray-100 opacity-60' : 'border-purple-500/20 shadow-lg shadow-purple-500/5'}">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black bg-purple-600/10 text-purple-600 px-3 py-1 rounded-lg uppercase tracking-wider">${k.package_name || 'Gói VIP'}</span>
                            <span class="text-[9px] font-bold ${isExpired ? 'text-red-500' : 'text-green-500'} uppercase tracking-widest">${isExpired ? 'Hết hạn' : 'Đang dùng'}</span>
                        </div>
                        <div class="font-mono text-xl font-black tracking-[0.2em] text-center py-4 bg-gray-50 dark:bg-black/20 rounded-2xl border-2 border-dashed border-gray-200 dark:border-white/5 dark:text-white select-all">
                            ${k.key_code}
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-[10px] font-bold text-gray-500 uppercase px-1">
                            <div class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> Hạn: ${expiryStr}</div>
                            <div class="flex items-center gap-1 justify-end"><i data-lucide="refresh-cw" class="w-3 h-3"></i> Còn: ${usageStr}</div>
                        </div>
                        <button onclick="copyToClipboard('${k.key_code}', this)" class="w-full h-12 bg-purple-600 text-white font-black rounded-xl shadow-lg shadow-purple-500/20 active:scale-95 transition-all text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Sao chép mã Key
                        </button>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        async function handleLogout() {
            if (!confirm('Bạn chắc chắn muốn đăng xuất?')) return;
            try { await fetch('/api/auth?action=logout'); } catch(e){}
            localStorage.clear(); location.href = '/';
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originContent = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> ĐÃ SAO CHÉP!';
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = originContent; lucide.createIcons(); }, 2000);
            });
        }

        function showUDIDGuide() {
            alert("💡 CÁCH TÌM UDID:\n\n1. Truy cập cuios.shop \n2. bấm vào nhận hàng \n3. Bấm lấy UDID rồi cho phép \n4. vào cài đặt chung - vpn & thiết bị rồi cài đặt cấu hình");
        }

        // Logic UDID Polling [4]
        let udidInterval = null;

        async function handleVerifyUDID() {
            const udid = document.getElementById('udidInput').value.trim().toUpperCase();
            const btn = document.getElementById('verifyUDIDBtn');
            const statusBox = document.getElementById('udidStatus');
            const statusText = document.getElementById('udidStatusText');

            if (!udid) return alert('❌ Vui lòng nhập UDID!');
            
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ĐANG XỬ LÝ...';
            lucide.createIcons();

            try {
                const res = await fetch('/api/user?action=verify-udid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('auth_token')}` },
                    body: JSON.stringify({ udid })
                });
                const data = await res.json();

                if (data.status === 'pending') {
                    statusBox.className = "p-4 rounded-2xl bg-blue-500/20 border border-white/10 text-sm font-bold text-center";
                    statusBox.classList.remove('hidden');
                    statusText.innerHTML = '<i data-lucide="clock" class="w-4 h-4 inline-block mr-1"></i> Đang xác minh đơn hàng, vui lòng chờ...';
                    lucide.createIcons();
                    startPollingUDID(udid);
                } else if (data.status === 'success' || data.status === 'already_claimed') {
                    handleUDIDFinalState(data);
                } else if (data.status === 'expired') {
                    statusBox.className = "p-4 rounded-2xl bg-orange-500/20 border border-white/10 text-sm font-bold text-center";
                    statusBox.classList.remove('hidden');
                    statusText.innerHTML = '⚠️ Gói VIP của UDID này đã hết hạn';
                    btn.disabled = false; btn.innerHTML = 'Xác minh UDID';
                } else {
                    alert('❌ ' + (data.error || 'Thất bại'));
                    btn.disabled = false; btn.innerHTML = 'Xác minh UDID';
                }
            } catch (e) {
                alert('💥 Lỗi kết nối server');
                btn.disabled = false; btn.innerHTML = 'Xác minh UDID';
            }
        }

        function startPollingUDID(udid) {
            if (udidInterval) clearInterval(udidInterval);
            udidInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/user?action=check-udid&udid=${udid}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('auth_token')}` }
                    });
                    const data = await res.json();
                    if (data.status === 'completed') {
                        clearInterval(udidInterval);
                        // Trigger verify-udid again to get the final result and key
                        handleVerifyUDID();
                    } else if (data.status === 'failed') {
                        clearInterval(udidInterval);
                        document.getElementById('udidStatus').className = "p-4 rounded-2xl bg-red-500/20 border border-white/10 text-sm font-bold text-center";
                        document.getElementById('udidStatusText').innerHTML = '❌ UDID không thuộc đơn hàng cuios.shop';
                        document.getElementById('verifyUDIDBtn').disabled = false;
                        document.getElementById('verifyUDIDBtn').innerHTML = 'Xác minh UDID';
                    }
                } catch (e) {}
            }, 3000);
        }

        function handleUDIDFinalState(data) {
            const statusBox = document.getElementById('udidStatus');
            const statusText = document.getElementById('udidStatusText');
            const btn = document.getElementById('verifyUDIDBtn');

            statusBox.className = "p-4 rounded-2xl bg-green-500/20 border border-white/10 text-sm font-bold text-center";
            statusBox.classList.remove('hidden');
            statusText.innerHTML = '🎉 Xác minh thành công! Nhận được 1 tháng VIP miễn phí!';
            btn.style.display = 'none';
            init(); // Refresh keys list
        }

        init();
    </script>
</body>
</html>

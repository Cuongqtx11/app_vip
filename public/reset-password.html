<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đặt lại mật khẩu | Kho App VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .dark body {
            background-color: #000000;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(28, 28, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-indigo-600 text-white shadow-xl shadow-purple-500/20 mb-4 cursor-pointer" onclick="location.href='/'">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-gray-900 dark:text-white uppercase">Mật khẩu mới</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium">Thiết lập mật khẩu mới cho tài khoản của bạn</p>
            </div>

            <div class="glass-card rounded-[2.5rem] shadow-2xl p-8 md:p-10">
                <form id="resetForm" onsubmit="handleReset(event)" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Mật khẩu mới</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="password" id="pass" required class="w-full h-14 pl-12 pr-4 bg-gray-50 dark:bg-white/5 border border-transparent focus:border-purple-500 rounded-2xl outline-none dark:text-white font-semibold" placeholder="Tối thiểu 6 ký tự">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Xác nhận mật khẩu</label>
                        <div class="relative">
                            <i data-lucide="check-circle" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="password" id="passConfirm" required class="w-full h-14 pl-12 pr-4 bg-gray-50 dark:bg-white/5 border border-transparent focus:border-purple-500 rounded-2xl outline-none dark:text-white font-semibold" placeholder="Nhập lại mật khẩu">
                        </div>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full h-14 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-black rounded-2xl shadow-lg shadow-purple-500/25 active:scale-95 transition-all uppercase tracking-widest">Cập nhật mật khẩu</button>
                </form>

                <div id="successMsg" class="hidden text-center space-y-4">
                    <div class="w-16 h-16 rounded-full bg-green-100 text-green-600 flex items-center justify-center mx-auto">
                        <i data-lucide="check" class="w-8 h-8"></i>
                    </div>
                    <p class="font-bold text-gray-900 dark:text-white">Thành công!</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Mật khẩu của bạn đã được thay đổi. Hãy đăng nhập lại.</p>
                    <button onclick="location.href='login.html'" class="w-full h-12 bg-purple-600 text-white rounded-xl font-bold">Đăng nhập ngay</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        async function handleReset(event) {
            event.preventDefault();
            const p = document.getElementById('pass').value;
            const pc = document.getElementById('passConfirm').value;
            if (p !== pc) return alert('❌ Mật khẩu không khớp!');

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) return alert('❌ Link không hợp lệ (thiếu token)');

            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('resetForm');
            const success = document.getElementById('successMsg');

            btn.disabled = true;
            btn.textContent = 'ĐANG XỬ LÝ...';

            try {
                const res = await fetch('/api/auth?action=reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: p })
                });
                const d = await res.json();
                if (d.success) {
                    form.classList.add('hidden');
                    success.classList.remove('hidden');
                } else {
                    alert('❌ ' + (d.error || 'Thất bại'));
                    btn.disabled = false;
                    btn.textContent = 'Cập nhật mật khẩu';
                }
            } catch (e) {
                alert('💥 Lỗi kết nối');
                btn.disabled = false;
                btn.textContent = 'Cập nhật mật khẩu';
            }
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup HACKMODVIP</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .hmv-popup-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(7, 16, 33, 0.72);
        backdrop-filter: blur(4px);
      }

      .hmv-popup-card {
        position: relative;
        width: 100%;
        max-width: 440px;
        border-radius: 24px;
        padding: 24px 20px;
        background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
        border: 1px solid rgba(0, 87, 217, 0.1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        color: #1a1a2e;
        overflow: hidden;
        animation: hmvPopupFade 0.28s ease;
      }

      .hmv-popup-card::before {
        content: '';
        position: absolute;
        inset: 0 0 auto 0;
        height: 5px;
        background: linear-gradient(90deg, #0057d9, #00a6ff, #6dd5ff);
      }

      @keyframes hmvPopupFade {
        from { transform: translateY(12px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .hmv-popup-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 38px;
        height: 38px;
        border: none;
        border-radius: 999px;
        background: rgba(0, 87, 217, 0.08);
        color: #0057d9;
        font-size: 24px;
        font-weight: 700;
        cursor: pointer;
      }

      .hmv-popup-badge {
        margin: 0 0 10px;
        color: #0057d9;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .hmv-popup-title {
        margin: 0 0 14px;
        color: #0f172a;
        font-size: 21px;
        line-height: 1.22;
        font-weight: 800;
        text-transform: uppercase;
      }

      .hmv-popup-image-wrap {
        width: 100%;
        margin-bottom: 18px;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      }

      .hmv-popup-image-wrap img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 22px;
        -webkit-user-drag: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .hmv-popup-action {
        display: block;
        width: 100%;
        margin: 0 0 12px;
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        text-align: center;
        text-decoration: none;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
        transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
        animation: hmvPopupActionPulse 2s ease-in-out infinite;
      }

      .hmv-popup-action:hover {
        transform: translateY(-1px);
        opacity: .98;
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.34);
      }

      .hmv-popup-dismiss {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        background: #e2e8f0;
        color: #0f172a;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }

      @keyframes hmvPopupActionPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.015); }
      }

      @media (max-width: 520px) {
        .hmv-popup-card { padding: 22px 16px; }
        .hmv-popup-title { font-size: 19px; }
        .hmv-popup-action { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <div id="hmv-home-popup" class="hmv-popup-overlay" aria-hidden="false">
      <div class="hmv-popup-card" role="dialog" aria-modal="true" aria-labelledby="hmv-popup-title">
        <button class="hmv-popup-close" type="button" aria-label="Đóng thông báo">×</button>
        <div class="hmv-popup-badge">HỆ THỐNG GAME CRACK</div>
        <h2 id="hmv-popup-title" class="hmv-popup-title">NƠI TẢI GAME, CÀI NHANH VÀ MUA DỊCH VỤ GAME TRÊN IOS</h2>
        <div class="hmv-popup-image-wrap">
          <img src="https://i.imgur.com/c3uIz2y.jpeg" alt="Hệ thống game crack" draggable="false" oncontextmenu="return false" ondragstart="return false" />
        </div>
        <a class="hmv-popup-action" href="https://hackmodvip.online" target="_blank" rel="noreferrer">Cài đặt Game Hack</a>
        <button class="hmv-popup-dismiss" type="button">Đóng</button>
      </div>
    </div>
  </body>
</html>
